name: Deploy Backend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, ':rocket: CI Deploy: Update Version')"
    
    steps:
      - name: Execute Deployment Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "Starting Deployment Process..."
            cd /home/bintang/pa-be
            
            echo "Pulling latest code from main..."
            git pull origin main
            
            echo "Installing dependencies..."
            npm install
            
            echo "Building packages..."
            npm run build
            
            echo "Recreating Prisma symlinks..."
            if ! grep -q "output" prisma/schema.prisma; then
              sed -i "s/previewFeatures = \\[\"multiSchema\"\\]/previewFeatures = [\"multiSchema\"]\n  output          = \".\/generated\/client\"/" prisma/schema.prisma
            fi
            npx prisma generate
            
            for s in auth attendance activity request config notification; do
              mkdir -p services/$s/prisma/generated
              ln -sfn "$PWD/prisma/generated/client" "$PWD/services/$s/prisma/generated/client"
            done
            
            echo "Restarting Systemd services..."
            sudo systemctl restart fintap-gateway fintap-auth fintap-attendance fintap-activity fintap-request fintap-config fintap-notification
            
            echo "Deployment Completed Successfully!"
